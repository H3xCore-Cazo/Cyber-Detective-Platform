# =============================================================================
# Cyber Detective DFIR Platform - Docker Compose
# =============================================================================
# Usage:
#   Development:   docker compose up
#   Production:    docker compose -f docker-compose.yml up -d
#   With SSL:      docker compose -f docker-compose.yml -f docker-compose.ssl.yml up -d
# =============================================================================

services:
  # ---- Next.js Application ----
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cyber-detective-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:/app/data/cyberdetective.db
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      # ---- Security: Change these in production! ----
      - JWT_SECRET=${JWT_SECRET:-change-me-to-a-secure-random-string-at-least-32-chars}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@cyberdetective.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-Admin@2024Secure!}
    volumes:
      - app-data:/app/data       # Persistent SQLite database
      - app-uploads:/app/uploads # Uploaded evidence files
    networks:
      - cyber-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---- Nginx Reverse Proxy ----
  nginx:
    image: nginx:alpine
    container_name: cyber-detective-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # For SSL, mount your certificates:
      # - ./ssl/cert.pem:/etc/nginx/ssl/cert.pem:ro
      # - ./ssl/key.pem:/etc/nginx/ssl/key.pem:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - cyber-net

# ---- Persistent Volumes ----
volumes:
  app-data:
    driver: local
  app-uploads:
    driver: local

# ---- Network ----
networks:
  cyber-net:
    driver: bridge
