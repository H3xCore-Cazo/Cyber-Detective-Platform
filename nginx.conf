# =============================================================================
# Cyber Detective DFIR Platform - Nginx Configuration
# =============================================================================
# Place this file at ./nginx.conf next to docker-compose.yml
# For SSL, uncomment the SSL server block and provide certificates
# =============================================================================

# Upstream Next.js app
upstream nextjs_app {
    server app:3000;
    keepalive 64;
}

# ---- HTTP Server (redirect to HTTPS in production) ----
server {
    listen 80;
    server_name _;

    # Uncomment to force HTTPS redirect:
    # return 301 https://$host$request_uri;

    # For now, serve directly over HTTP
    location / {
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;

        # Headers for Next.js
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;  # Long for lab sessions

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        # Caching static assets
        proxy_cache_bypass $http_upgrade;
    }

    # Static assets - aggressive caching
    location /_next/static/ {
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        expires 365d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
    }

    # API routes - no caching
    location /api/ {
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # No caching for API
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";

        # Timeout for long-running requests (AI, lab operations)
        proxy_read_timeout 120s;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws: wss:;" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Block sensitive files
    location ~ /\. {
        deny all;
        return 404;
    }
    location ~* \.(env|db|sqlite|sqlite3)$ {
        deny all;
        return 404;
    }
}

